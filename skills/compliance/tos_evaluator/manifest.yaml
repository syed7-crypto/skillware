name: "compliance/tos_evaluator"
version: "0.1.0"
description: "Evaluates whether an intended automated website action appears permissible by checking robots.txt, discovered legal pages, and optional low-cost LLM review for ambiguous policy language."
category: "compliance"
parameters:
  type: object
  properties:
    target_url:
      type: string
      description: "The full website URL the agent intends to access."
    intended_action:
      type: string
      description: "Natural-language description of the automation, such as scrape pricing data, index docs, or use the API."
    user_agent:
      type: string
      description: "Optional user-agent string used for robots.txt evaluation."
    fetch_mode:
      type: string
      description: "How broadly to search for legal pages. Options: lightweight or deep."
      enum: ["lightweight", "deep"]
    use_llm_evaluator:
      type: boolean
      description: "If true, uses an optional LLM fallback for low-confidence or ambiguous legal clauses."
    llm_provider:
      type: string
      description: "Optional provider for the clause evaluator. Gemini is the documented example."
    llm_model:
      type: string
      description: "Optional model name for the clause evaluator, such as gemini-2.5-flash-lite."
    assume_authenticated_session:
      type: boolean
      description: "Whether to evaluate the request as if the agent is acting within a logged-in or paid session."
    max_terms_pages:
      type: integer
      description: "Maximum number of discovered legal pages to fetch and inspect."
  required:
    - target_url
    - intended_action
outputs:
  is_safe_to_proceed:
    type: boolean
    description: "Whether the evaluator found enough evidence to consider the action safe."
  confidence_score:
    type: number
    description: "The evaluator's confidence in the final verdict."
  verdict:
    type: string
    description: "One of SAFE, UNSAFE, CAUTION, or INSUFFICIENT_EVIDENCE."
  reason:
    type: string
    description: "Short explanation of the primary reason for the verdict."
requirements:
  - requests
  - bs4
constitution: |
  1. LEGAL CAUTION: Never represent the result as formal legal advice or a definitive legal interpretation.
  2. CONSERVATIVE VERDICTS: Prefer CAUTION or INSUFFICIENT_EVIDENCE over falsely approving ambiguous automated access.
  3. SCOPE LIMITATION: Only evaluate permissibility signals; do not perform the target scraping, crawling, or extraction task.
  4. PRIVACY: Do not send fetched policy text to an external model unless the caller explicitly enables the optional LLM evaluator.
env_vars:
  GOOGLE_API_KEY:
    description: "Optional. Required only when llm_provider is Gemini and use_llm_evaluator is enabled."
    required: false
presentation:
  icon: "shield"
  color: "#16a34a"
